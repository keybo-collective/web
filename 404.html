<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    referrerpolicy="no-referrer"
  />
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    rel="stylesheet"
    referrerpolicy="no-referrer"
  />
  <script>
    (function() {
      const media = window.matchMedia('(prefers-color-scheme: dark)');
      const setTheme = (dark) => {
        document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
      };
      setTheme(media.matches);
      media.addEventListener('change', (e) => setTheme(e.matches));
    })();
  </script>
  <style>
    @media (prefers-color-scheme: light) {
      html, body { background: #fafafa; color: #111; }
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #1f1f1f; color: #eee; }
    }

    :root {
      --spacer: 0.5rem;
    }
    .icon {
      font-size: 3rem;
      padding-left: var(--spacer);
      padding-right: var(--spacer);
    }
    .text {
      font-size: 3rem;
      padding-left: var(--spacer);
      padding-right: var(--spacer);
    }
  </style>
</head>
<body>
  <div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="row align-items-center">
      <div class="col-12 col-md-3 d-flex align-items-center justify-content-center">
        <i class="icon fas fa-exclamation-triangle text-danger" aria-hidden="true"></i>
      </div>
      <div class="col-12 col-md-9 text-center text-md-start">
        <h1 class="text h3 mb-0 text-nowrap">404</h1>
      </div>
    </div>
  </div>
</body>
</html>
