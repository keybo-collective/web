<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    referrerpolicy="no-referrer"
  />
  <script>
    (function() {
      const media = window.matchMedia('(prefers-color-scheme: dark)');
      const setTheme = (dark) => {
        document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
      };
      setTheme(media.matches);
      media.addEventListener('change', (e) => setTheme(e.matches));
    })();
  </script>
  <style>
    @media (prefers-color-scheme: light) {
      html, body { background: #fafafa; color: #111; }
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #1f1f1f; color: #eee; }
    }

    :root {
      --spacer: 0.5rem;
    }
    .icon {
      font-size: 3rem;
      padding-left: var(--spacer);
      padding-right: var(--spacer);
    }
    .text {
      font-size: 3rem;
      padding-left: var(--spacer);
      padding-right: var(--spacer);
    }
  </style>
</head>
<body>
  <div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="row align-items-stretch">
      <div class="col-12 col-md-3 d-flex align-items-center justify-content-center">
        <img src="./assets/img/favicon.svg" width="128" height="128" alt="Keybo" />
      </div>
      <div class="d-none d-md-flex col-md-1 align-items-center border-end border-2 border-dark-subtle"></div>
      <div class="d-none d-md-flex col-md-1 align-items-center border-start border-2 border-light-subtle"></div>
      <div class="col-12 col-md-7 d-flex align-items-center justify-content-center justify-content-md-start">
        <h1 class="text h3 mb-0 p-0 text-nowrap h2">Coming Soon</h1>
      </div>
    </div>
  </div>
</body>
</html>
